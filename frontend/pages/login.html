<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — CarbonX</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-brand">🌍 CarbonX</a>
  <div class="nav-links"><a href="/register" class="btn btn-primary">Register</a></div>
</nav>
<div class="auth-page">
<div class="auth-card">
  <h2>Welcome Back</h2>
  <p class="subtitle">Log in to your CarbonX account</p>
  <div id="alert-box"></div>
  <form id="loginForm" novalidate>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="your@email.com" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%" id="loginBtn">
      Log In
    </button>
  </form>
  <p style="text-align:center;margin-top:1.5rem;font-size:.88rem;color:var(--muted)">
    No account? <a href="/register">Register here</a>
  </p>
</div>
</div>
<script src="/js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const fd = new FormData(this);
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  try {
    const data = await api.login(Object.fromEntries(fd.entries()));
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    const redirect = new URLSearchParams(location.search).get('redirect') || '/dashboard';
    window.location.href = redirect;
  } catch(err) {
    document.getElementById('alert-box').innerHTML =
      `<div class="alert alert-error">❌ ${err.message}</div>`;
    btn.innerHTML = 'Log In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
